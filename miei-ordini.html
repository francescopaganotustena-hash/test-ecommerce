<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Miei Ordini | TechStore</title>
  <meta name="description" content="Consulta lo storico ordini, tracking spedizione e dettagli acquisti TechStore.">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔌</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    .service-hero { background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue)); color: white; padding: var(--spacing-xxl) 0; text-align: center; }
    .service-section { padding: var(--spacing-xxl) 0; }
    .order-box { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-md); }
    .order-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .badge-soft { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .badge-soft.ok { background: #d4edda; color: #155724; }
    .badge-soft.ship { background: #cce5ff; color: #004085; }
    .badge-soft.pending { background: #fff3cd; color: #856404; }
    .badge-soft.cancelled { background: #f8d7da; color: #721c24; }
    .order-actions { margin-top: 12px; display: flex; justify-content: flex-end; }
    .empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-muted); }
    .service-links { background: var(--bg-light); border-radius: var(--radius-lg); padding: var(--spacing-lg); display: flex; flex-wrap: wrap; gap: var(--spacing-sm); margin-top: var(--spacing-lg); }
    .service-links a { display: inline-block; padding: 0.4rem 0.8rem; border-radius: 999px; text-decoration: none; background: white; border: 1px solid var(--border-color); color: var(--text-dark); font-weight: 500; font-size: 0.9rem; }
    .service-links a.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Vai al contenuto principale</a>
  <header class="header">
    <div class="header-main"><div class="container"><div class="d-flex align-items-center"><a href="index.html" class="header-logo">🔌 Tech<span>Store</span></a></div></div></div>
  </header>

  <div class="breadcrumb-section"><div class="container"><nav class="breadcrumb"><span class="breadcrumb-item"><a href="index.html">Home</a></span><span class="breadcrumb-separator">/</span><span class="breadcrumb-item active">I Miei Ordini</span></nav></div></div>

  <main id="main-content">
    <section class="service-hero"><div class="container"><h1>I Miei Ordini</h1><p>Storico acquisti e stato aggiornato in tempo reale.</p></div></section>
    <section class="service-section">
      <div class="container">
        <div id="orders-list"></div>

        <div class="service-links">
          <a href="area-cliente.html">Area Cliente</a>
          <a class="active" href="miei-ordini.html">I Miei Ordini</a>
          <a href="spedizioni.html">Spedizioni</a>
          <a href="resi-rimborsi.html">Resi e Rimborsi</a>
          <a href="garanzia.html">Garanzia</a>
          <a href="faq.html">FAQ</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script>
    function safeParseJson(value, fallback) {
      try {
        const parsed = JSON.parse(value);
        return parsed ?? fallback;
      } catch (error) {
        return fallback;
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getCurrentUserContext() {
      const session = safeParseJson(localStorage.getItem('techstore_session') || 'null', null);
      const user = safeParseJson(localStorage.getItem('techstore_user') || 'null', null);
      if (!session || !session.loggedIn) return null;

      return {
        session,
        userId: String((user && user.id) || session.userId || '').trim(),
        email: String((user && user.email) || session.email || '').trim().toLowerCase()
      };
    }

    function isOrderOwnedByCurrentUser(order, context) {
      if (!context || !order) return false;

      const orderUserId = String(order.userId || '').trim();
      const orderEmail = String(order.userEmail || order.customer?.email || '').trim().toLowerCase();

      if (context.userId && orderUserId) {
        return context.userId === orderUserId;
      }

      return Boolean(context.email) && orderEmail === context.email;
    }

    function getStatusData(status) {
      if (status === 'delivered') return { className: 'ok', label: 'Consegnato' };
      if (status === 'shipped') return { className: 'ship', label: 'Spedito' };
      if (status === 'cancelled') return { className: 'cancelled', label: 'Annullato' };
      return { className: 'pending', label: 'In elaborazione' };
    }

    function renderOrders() {
      const context = getCurrentUserContext();
      if (!context) {
        window.location.href = 'login.html';
        return;
      }

      const allOrders = safeParseJson(localStorage.getItem('techstore_orders') || '[]', []);
      const orders = allOrders
        .filter(order => isOrderOwnedByCurrentUser(order, context))
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      const container = document.getElementById('orders-list');
      if (!container) return;

      if (!orders.length) {
        container.innerHTML = `
          <div class="order-box empty-state">
            <div style="font-size: 2.5rem; margin-bottom: 0.6rem;">📦</div>
            <h2 class="h5 mb-2">Nessun ordine ancora</h2>
            <p class="mb-3">Non hai ancora effettuato ordini con questo account.</p>
            <a href="catalogo.html" class="btn btn-primary">Vai al catalogo</a>
          </div>
        `;
        return;
      }

      container.innerHTML = orders.map((order) => {
        const status = getStatusData(order.status);
        const date = new Date(order.date);
        const dateText = Number.isNaN(date.getTime())
          ? '-'
          : date.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' });
        const total = Number(order.total) || 0;
        const firstItem = (order.items || [])[0];
        const itemsCount = (order.items || []).reduce((acc, item) => acc + (Number(item.quantity) || 1), 0);

        return `
          <div class="order-box">
            <div class="order-head">
              <div><strong>Ordine #${escapeHtml(order.orderId || '-')}</strong><br><small class="text-muted">Creato il ${escapeHtml(dateText)}</small></div>
              <span class="badge-soft ${status.className}">${status.label}</span>
            </div>
            <hr>
            <p class="mb-1">${escapeHtml(firstItem ? firstItem.name : 'Nessun articolo')}</p>
            <p class="text-muted mb-2">${itemsCount} articolo/i</p>
            <strong>Totale: €${total.toFixed(2)}</strong>
            <div class="order-actions">
              <a href="ordine.html?id=${encodeURIComponent(order.orderId || '')}" class="btn btn-outline-primary btn-sm">Dettagli ordine</a>
            </div>
          </div>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', renderOrders);
  </script>
</body>
</html>
